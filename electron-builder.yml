appId: com.tractodb.app
productName: TractoDB
copyright: Copyright © 2024 TractoDB

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron

linux:
  target:
    - deb
    - AppImage
  icon: build/icon.png
  category: Development
  description: TractoDB — handle and manage your databases
  maintainer: Fikri <fikri.anshori@tatametal.com>

deb:
  priority: optional
  compression: xz
  afterInstall: build/deb-after-install.sh
  depends:
    - libsecret-1-0
    - libnss3
    - libgtk-3-0

appImage:
  license: LICENSE

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
  icon: build/icon.ico

publish:
  provider: github
  releaseType: draft
