appId: com.dbstudio.app
productName: DBStudio
copyright: Copyright © 2024 DBStudio

directories:
  buildResources: build
  output: release

files:
  - dist
  - dist-electron

linux:
  target:
    - deb
    - AppImage
  icon: build/icon.png
  category: Development
  description: Modern minimalist desktop database manager
  maintainer: Fikri <fikri.anshori@tatametal.com>

deb:
  priority: optional
  compression: xz
  depends:
    - libsecret-1-0
    - libnss3
    - libgtk-3-0

appImage:
  license: MIT

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - nsis
  icon: build/icon.ico

publish:
  provider: github
  releaseType: draft
